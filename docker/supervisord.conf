[supervisord]
nodaemon=true
user=root

[program:postgres]
user=postgres
command=postgres -D /var/lib/postgresql/data
environment=PGDATA="/var/lib/postgresql/data"
autorestart=true
stopsignal=SIGINT

[program:redis]
command=redis-server
autorestart=true

[program:app]
command=node dist/index.js --prod
directory=/app
environment=DB_HOST="localhost",DB_PORT="5432",REDIS_URL="redis://localhost:6379"
autorestart=true